name: Sync from scp-json-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  sync-scp-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v6

      - name: Checkout SCP data repo
        uses: actions/checkout@v6
        with:
          repository: sixeightyfour/scp-json-sync
          path: scp-json-sync

      - name: Prepare destination folder
        run: |
          mkdir -p data/scp/raw

      - name: Copy raw JSON files
        run: |
          for file in scp_items.json scp_tales.json scp_hubs.json goi.json; do
            if [ -f "scp-json-sync/output/raw/$file" ]; then
              cp "scp-json-sync/output/raw/$file" "data/scp/raw/$file"
            else
              echo "Missing raw file: scp-json-sync/output/raw/$file"
              exit 1
            fi
          done

      - name: Show copied files
        run: |
          echo "Copied files:"
          find data/scp -type f | sort

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/scp

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync SCP data"
            git push
          fi
